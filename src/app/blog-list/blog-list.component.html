@if (showPreview) {
  <app-blog-preview [blog]="blogs[0]"></app-blog-preview>
}

<div id="wrapper">
  <div class="row">
    @for (blog of blogsToList(); track blog; let i = $index) {
      <div class="blog-col col-12 col-md-6 col-lg-4">
        <div class="blog-container" (click)="gotoBlog(blog)">
          <div class="thumbnail" [style.backgroundImage]="getImage(i)"></div>
          <div class="title-container">
            <div class="title">{{ getTitle(blog) }}</div>
            <div class="date">{{ getDate(blog) }}</div>
            <div class="description">{{ getTagline(blog) }}</div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
