<div id="wrapper">
  <div class="row">
    @for (post of instaPosts; track post; let i = $index) {
      <div class="insta-col col-6 col-md-3">
        <a [href]="post.fields.url" target="_blank" class="img-container">
          <div class="instaImage" [style.backgroundImage]="getImage(post)"></div>
          @if (post.fields.multiple) {
            <i class="fa fa-clone"></i>
          }
          <div class="overlay">
            <span>{{ getCaption(post) }}</span>
          </div>
        </a>
      </div>
    }
  </div>
</div>
